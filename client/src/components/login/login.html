<template>
  <section class="login-page" aria-label="Policy management login page">
    <div class="login-hero" aria-hidden="true">
      <div class="login-brand-mark">PMS</div>
      <p class="login-eyebrow">Policy management system</p>
      <h1>Control every policy flow</h1>
      <p class="login-hero-text">
        Sign in to review policies, monitor submissions, and keep approval decisions moving from one secure workspace.
      </p>
      <div class="login-highlights">
        <span>Policy review</span>
        <span>Submission tracking</span>
        <span>Role based control</span>
      </div>
    </div>

    <div class="login-card">
      <div class="login-card-header">
        <div class="login-icon" aria-hidden="true">PMS</div>
        <p class="login-eyebrow">Secure policy console</p>
        <h2>Access your workspace</h2>
        <p>Use your policy management credentials to continue.</p>
      </div>

      <div class="login-field">
        <label for="login-email">Email address</label>
        <div class="input-wrap">
          <!-- <span aria-hidden="true"></span> -->
          <input id="login-email" type="email" value.bind="email" placeholder="name@example.com" autocomplete="email" />
        </div>
      </div>

      <div class="login-field">
        <label for="login-password">Password</label>
        <div class="input-wrap">
          <!-- <span aria-hidden="true">*</span> -->
          <input id="login-password" type="password" value.bind="password" placeholder="Enter your password" autocomplete="current-password" />
        </div>
      </div>

      <button type="button" class="login-button" click.trigger="login()">
        <span>Open policy dashboard</span>
        <span aria-hidden="true">-&gt;</span>
      </button>

      <div if.bind="error" class="login-error" role="alert">
        ${error}
      </div>

      <div class="login-footer">
        Need policy access?
        <a route-href="route: register">Request an account</a>
      </div>
    </div>
  </section>
</template>
