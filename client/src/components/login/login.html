<template>
  <section class="login-page" aria-label="Login page">
    <div class="login-hero" aria-hidden="true">
      <div class="login-brand-mark">RB</div>
      <p class="login-eyebrow">Secure access portal</p>
      <h1>Welcome back</h1>
      <p class="login-hero-text">
        Sign in to manage roles, permissions, and dashboard insights from one clean workspace.
      </p>
      <div class="login-highlights">
        <span>Role based access</span>
        <span>Protected dashboard</span>
        <span>Fast administration</span>
      </div>
    </div>

    <div class="login-card">
      <div class="login-card-header">
        <div class="login-icon" aria-hidden="true">Lock</div>
        <p class="login-eyebrow">Aurelia RBAC</p>
        <h2>Login to your account</h2>
        <p>Enter your credentials to continue to the dashboard.</p>
      </div>

      <div class="login-field">
        <label for="login-email">Email address</label>
        <div class="input-wrap">
          <span aria-hidden="true">@</span>
          <input id="login-email" type="email" value.bind="email" placeholder="name@example.com" autocomplete="email" />
        </div>
      </div>

      <div class="login-field">
        <label for="login-password">Password</label>
        <div class="input-wrap">
          <span aria-hidden="true">*</span>
          <input id="login-password" type="password" value.bind="password" placeholder="Enter your password" autocomplete="current-password" />
        </div>
      </div>

      <button type="button" class="login-button" click.trigger="login()">
        <span>Login</span>
        <span aria-hidden="true">-&gt;</span>
      </button>

      <div if.bind="error" class="login-error" role="alert">
        ${error}
      </div>

      <div class="login-footer">
        Don't have an account?
        <a route-href="route: register">Create one</a>
      </div>
    </div>
  </section>
</template>
